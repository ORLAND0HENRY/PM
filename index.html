<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PILGRIMS FAMILY // POSTER ENGINE v2.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

        :root { --amber-500: #f59e0b; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a, #050505);
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        canvas {
            max-width: 100%;
            height: auto;
            border-radius: 24px;
            background: #ffffff;
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.8);
        }

        input, textarea {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus, textarea:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--amber-500);
            outline: none;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="selection:bg-amber-500 selection:text-black min-h-screen">

    <div class="flex flex-col min-h-screen">
        <!-- Header -->
        <nav class="border-b border-white/5 px-4 md:px-8 py-4 flex justify-between items-center glass sticky top-0 z-50">
            <div class="flex items-center gap-3 md:gap-4">
                <div class="w-10 h-10 md:w-12 md:h-12 bg-amber-500 rounded-xl md:rounded-2xl flex items-center justify-center rotate-3 shadow-lg shadow-amber-500/20">
                    <i class="fa-solid fa-cross text-black text-lg md:text-xl"></i>
                </div>
                <div>
                    <h1 class="font-black tracking-tighter uppercase text-lg md:text-2xl leading-none">Pilgrims <span class="text-amber-500">Archive</span></h1>
                    <p class="text-[8px] md:text-[9px] font-bold text-neutral-500 tracking-[0.3em] uppercase mt-1">Spiritual Year 2026</p>
                </div>
            </div>
            <div class="hidden sm:block text-right">
                <p class="text-[10px] font-black text-neutral-400 uppercase tracking-widest">v2.3 Core</p>
                <p class="text-[8px] font-bold text-amber-500/60 uppercase">Balanced 3:4 Layout</p>
            </div>
        </nav>

        <main class="flex-1 p-4 md:p-8 lg:p-12">
            <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12">

                <!-- Preview (Top on mobile) -->
                <div class="lg:col-span-7 flex flex-col items-center order-1 lg:order-2">
                    <div class="relative group w-full max-w-[500px] lg:max-w-none">
                        <div class="absolute -inset-10 md:-inset-20 bg-amber-500/5 rounded-full blur-[80px] md:blur-[120px]"></div>
                        <canvas id="posterCanvas" class="relative z-10 w-full"></canvas>
                    </div>
                </div>

                <!-- Controls -->
                <div class="lg:col-span-5 space-y-6 order-2 lg:order-1">
                    <div class="glass p-6 md:p-8 rounded-[2rem] md:rounded-[2.5rem] space-y-6">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                            <h2 class="text-[10px] font-black text-neutral-400 uppercase tracking-[0.4em]">Configuration</h2>
                        </div>

                        <div class="space-y-4 md:space-y-5">
                            <div class="space-y-2">
                                <label class="text-[9px] font-bold text-neutral-500 uppercase tracking-widest">Celebrant Name</label>
                                <input type="text" id="inputName" value="Brother John Doe"
                                    class="w-full bg-white/5 border border-white/10 p-4 rounded-xl md:rounded-2xl font-bold text-white text-sm md:text-base">
                            </div>

                            <div class="space-y-2">
                                <label class="text-[9px] font-bold text-neutral-500 uppercase tracking-widest">Message</label>
                                <textarea id="inputWishes"
                                    class="w-full bg-white/5 border border-white/10 p-4 rounded-xl md:rounded-2xl h-24 text-sm text-neutral-300 leading-relaxed resize-none">May your journey be filled with the warmth of His love and the strength of the Spirit. Happy Birthday from your Pilgrims Family.</textarea>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="space-y-2">
                                    <label class="text-[9px] font-bold text-neutral-500 uppercase tracking-widest">Verse</label>
                                    <input type="text" id="inputVerse" value="The Lord is my light and my salvation."
                                        class="w-full bg-white/5 border border-white/10 p-4 rounded-xl md:rounded-2xl text-sm text-white">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[9px] font-bold text-neutral-500 uppercase tracking-widest">Reference</label>
                                    <input type="text" id="inputRef" value="Psalm 27:1"
                                        class="w-full bg-white/5 border border-white/10 p-4 rounded-xl md:rounded-2xl text-sm font-mono text-amber-500 uppercase">
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 pt-4">
                            <button onclick="document.getElementById('fileInput').click()"
                                class="flex items-center justify-center gap-3 py-4 md:py-5 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl md:rounded-2xl font-black text-[10px] transition-all uppercase tracking-widest group">
                                <i class="fa-solid fa-camera text-amber-500"></i> Upload Photo
                            </button>
                            <input type="file" id="fileInput" hidden accept="image/*">

                            <button onclick="downloadPoster()"
                                class="flex items-center justify-center gap-3 py-4 md:py-5 bg-amber-500 hover:bg-amber-400 rounded-xl md:rounded-2xl font-black text-[10px] text-black transition-all uppercase tracking-widest shadow-xl shadow-amber-500/20">
                                <i class="fa-solid fa-file-export"></i> Export PNG
                            </button>
                        </div>
                    </div>

                    <div class="p-5 md:p-6 rounded-2xl md:rounded-3xl border border-white/5 glass text-[9px] md:text-[10px] text-neutral-500 uppercase tracking-widest leading-relaxed">
                        Engine v2.3 utilizes a balanced 3:4 frame ratio for professional aesthetic composition. Responsive viewport active.
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const canvas = document.getElementById('posterCanvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('fileInput');

        let userImage = null;
        const W = 1000;
        const H = 1400;
        const AMBER = '#f59e0b';
        const SLATE = '#0f172a';

        canvas.width = W;
        canvas.height = H;

        function draw() {
            // White Background
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, W, H);

            const margin = 80;
            const centerX = W / 2;

            // Header - Subtle Badge
            ctx.fillStyle = '#f8fafc';
            ctx.beginPath();
            ctx.roundRect(centerX - 150, 40, 300, 35, 100);
            ctx.fill();

            ctx.fillStyle = '#94a3b8';
            ctx.font = '900 12px Inter';
            ctx.textAlign = 'center';
            ctx.letterSpacing = "3px";
            ctx.fillText('PILGRIMS FAMILY // 2026', centerX, 62);
            ctx.letterSpacing = "0px";

            // PHOTO FRAME - Balanced 3:4
            const frameW = 600;
            const frameH = 800;
            const frameX = (W - frameW) / 2;
            const frameY = 100;

            ctx.fillStyle = '#f1f5f9';
            ctx.beginPath();
            ctx.roundRect(frameX, frameY, frameW, frameH, 20);
            ctx.fill();

            if (userImage) {
                const imgRatio = userImage.width / userImage.height;
                const boxRatio = frameW / frameH;
                let renderW, renderH, cx, cy;

                if (imgRatio > boxRatio) {
                    renderH = frameH;
                    renderW = frameH * imgRatio;
                    cx = frameX + (frameW - renderW) / 2;
                    cy = frameY;
                } else {
                    renderW = frameW;
                    renderH = frameW / imgRatio;
                    cx = frameX;
                    cy = frameY + (frameH - renderH) / 2;
                }

                ctx.save();
                ctx.beginPath();
                ctx.roundRect(frameX, frameY, frameW, frameH, 20);
                ctx.clip();
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.drawImage(userImage, cx, cy, renderW, renderH);
                ctx.restore();
            }

            // Name Banner
            const name = (document.getElementById('inputName').value || 'MEMBER').toUpperCase();

            ctx.save();
            ctx.fillStyle = AMBER;
            ctx.shadowColor = 'rgba(0,0,0,0.1)';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.roundRect(centerX - 250, frameY + frameH - 60, 500, 120, 20);
            ctx.fill();
            ctx.restore();

            ctx.fillStyle = '#000000';
            ctx.textAlign = 'center';
            ctx.font = '900 44px Inter';
            ctx.letterSpacing = "-1px";
            ctx.fillText(name, centerX, frameY + frameH + 15);
            ctx.letterSpacing = "0px";

            // Text Content Section - Start after Name Banner
            let currentY = frameY + frameH + 110;

            // Birthday Title
            ctx.fillStyle = SLATE;
            ctx.font = 'italic 700 38px "Playfair Display"';
            ctx.fillText('Happy Birthday', centerX, currentY);

            currentY += 50;
            ctx.fillStyle = '#475569';
            ctx.font = '400 24px Inter';
            currentY = wrapText(document.getElementById('inputWishes').value, centerX, currentY, 700, 34, true);

            // Dynamic Divider Location
            currentY += 60;
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(centerX - 80, currentY);
            ctx.lineTo(centerX + 80, currentY);
            ctx.stroke();

            currentY += 50;
            ctx.fillStyle = SLATE;
            ctx.font = 'italic 700 30px "Playfair Display"';
            const verseText = `"${document.getElementById('inputVerse').value}"`;
            currentY = wrapText(verseText, centerX, currentY, 750, 40, true);

            ctx.fillStyle = AMBER;
            ctx.font = '900 18px Inter';
            ctx.fillText(`${document.getElementById('inputRef').value.toUpperCase()}`, centerX, currentY + 45);

            // Footer - Fixed safe position at bottom
            ctx.fillStyle = '#94a3b8';
            ctx.font = '800 12px Inter';
            ctx.letterSpacing = "2px";
            ctx.fillText('PILGRIMS FAMILY • SPIRITUAL YEAR 2026', centerX, H - 50);
        }

        function wrapText(text, x, y, maxWidth, lineHeight, isCentered = false) {
            const words = text.split(' ');
            let line = '';
            let lastY = y;
            ctx.textAlign = isCentered ? 'center' : 'left';

            for (let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' ';
                let metrics = ctx.measureText(testLine);
                if (metrics.width > maxWidth && n > 0) {
                    ctx.fillText(line.trim(), x, lastY);
                    line = words[n] + ' ';
                    lastY += lineHeight;
                } else {
                    line = testLine;
                }
            }
            ctx.fillText(line.trim(), x, lastY);
            return lastY;
        }

        function downloadPoster() {
            const name = document.getElementById('inputName').value.trim() || 'Pilgrim';
            const link = document.createElement('a');
            link.download = `PF_Poster_26_${name.replace(/\s+/g, '_')}.png`;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        }

        ['inputName', 'inputVerse', 'inputRef', 'inputWishes'].forEach(id => {
            document.getElementById(id).addEventListener('input', draw);
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        userImage = img;
                        draw();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        document.fonts.ready.then(draw);
    </script>
</body>
</html>
