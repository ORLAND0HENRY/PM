<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PILGRIMS FAMILY // POSTER ENGINE v2.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

        :root { --amber-500: #f59e0b; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a, #050505);
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        canvas {
            max-width: 100%;
            height: auto;
            border-radius: 16px;
            background: #ffffff;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.9);
        }

        input, textarea {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus, textarea:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--amber-500);
            outline: none;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="selection:bg-amber-500 selection:text-black min-h-screen">

    <div class="flex flex-col min-h-screen">
        <!-- Header -->
        <nav class="border-b border-white/5 px-8 py-5 flex justify-between items-center glass sticky top-0 z-50">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-amber-500 rounded-2xl flex items-center justify-center rotate-3 shadow-lg shadow-amber-500/20">
                    <i class="fa-solid fa-cross text-black text-xl"></i>
                </div>
                <div>
                    <h1 class="font-black tracking-tighter uppercase text-2xl leading-none">Pilgrims <span class="text-amber-500">Archive</span></h1>
                    <p class="text-[9px] font-bold text-neutral-500 tracking-[0.4em] uppercase mt-1">Spiritual Year 2026</p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-[11px] font-black text-neutral-400 uppercase tracking-widest">v2.2 Production</p>
                <p class="text-[9px] font-bold text-amber-500/60 uppercase">Full Aspect Fill Active</p>
            </div>
        </nav>

        <main class="flex-1 p-6 lg:p-12">
            <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-12">

                <!-- Controls -->
                <div class="lg:col-span-5 space-y-6 order-2 lg:order-1">
                    <div class="glass p-8 rounded-[2.5rem] space-y-6">
                        <div class="flex items-center gap-3 mb-4">
                            <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                            <h2 class="text-xs font-black text-neutral-400 uppercase tracking-[0.4em]">Configuration</h2>
                        </div>

                        <div class="space-y-5">
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold text-neutral-500 uppercase tracking-widest">Celebrant</label>
                                <input type="text" id="inputName" value="Brother John Doe"
                                    class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl font-bold text-white">
                            </div>

                            <div class="space-y-2">
                                <label class="text-[10px] font-bold text-neutral-500 uppercase tracking-widest">Message</label>
                                <textarea id="inputWishes"
                                    class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl h-24 text-sm text-neutral-300 leading-relaxed resize-none">May your journey be filled with the warmth of His love and the strength of the Spirit. Happy Birthday from your Pilgrims Family.</textarea>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-2">
                                    <label class="text-[10px] font-bold text-neutral-500 uppercase tracking-widest">Verse</label>
                                    <input type="text" id="inputVerse" value="The Lord is my light and my salvation."
                                        class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-sm text-white">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[10px] font-bold text-neutral-500 uppercase tracking-widest">Reference</label>
                                    <input type="text" id="inputRef" value="Psalm 27:1"
                                        class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-sm font-mono text-amber-500">
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4 pt-4">
                            <button onclick="document.getElementById('fileInput').click()"
                                class="flex items-center justify-center gap-3 py-5 bg-white/5 hover:bg-white/10 border border-white/10 rounded-2xl font-black text-[10px] transition-all uppercase tracking-widest group">
                                <i class="fa-solid fa-camera text-amber-500"></i> Upload Photo
                            </button>
                            <input type="file" id="fileInput" hidden accept="image/*">

                            <button onclick="downloadPoster()"
                                class="flex items-center justify-center gap-3 py-5 bg-amber-500 hover:bg-amber-400 rounded-2xl font-black text-[10px] text-black transition-all uppercase tracking-widest shadow-xl shadow-amber-500/20">
                                <i class="fa-solid fa-file-export"></i> Export PNG
                            </button>
                        </div>
                    </div>

                    <div class="p-6 rounded-3xl border border-white/5 glass text-[10px] text-neutral-500 uppercase tracking-widest leading-relaxed">
                        Optimized for 3072×4080 (3:4 ratio). The engine uses "Cover" logic to ensure a full-bleed fit without empty space.
                    </div>
                </div>

                <!-- Preview -->
                <div class="lg:col-span-7 flex flex-col items-center order-1 lg:order-2">
                    <div class="relative group">
                        <div class="absolute -inset-20 bg-amber-500/5 rounded-full blur-[120px]"></div>
                        <canvas id="posterCanvas" class="relative z-10"></canvas>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        const canvas = document.getElementById('posterCanvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('fileInput');

        let userImage = null;
        const W = 874;
        const H = 1240;
        const AMBER = '#f59e0b';
        const SLATE = '#0f172a';

        canvas.width = W;
        canvas.height = H;

        function draw() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, W, H);

            // Frame Borders
            ctx.strokeStyle = '#f1f5f9';
            ctx.lineWidth = 30;
            ctx.strokeRect(15, 15, W - 30, H - 30);

            const margin = 100;
            const leftColWidth = 350;

            // Header Info
            ctx.fillStyle = AMBER;
            ctx.fillRect(margin, 80, 45, 7);
            ctx.fillStyle = '#94a3b8';
            ctx.font = '900 12px Inter';
            ctx.textAlign = 'left';
            ctx.letterSpacing = "2px";
            ctx.fillText('PILGRIMS FAMILY // MINISTRY ASSET', margin, 115);
            ctx.letterSpacing = "0px";

            // Main Title
            ctx.fillStyle = SLATE;
            ctx.font = 'italic 700 85px "Playfair Display"';
            ctx.fillText('Happy', margin - 5, 230);
            ctx.font = '900 68px Inter';
            ctx.letterSpacing = "-3px";
            ctx.fillText('BIRTHDAY', margin, 305);
            ctx.letterSpacing = "0px";

            // PHOTO FRAME (Perfect Aspect Logic)
            const imgBox = { x: 480, y: 80, w: 314, h: 780 };

            ctx.fillStyle = '#f8fafc';
            ctx.beginPath();
            ctx.roundRect(imgBox.x, imgBox.y, imgBox.w, imgBox.h, 12);
            ctx.fill();

            if (userImage) {
                // "COVER" LOGIC - Fill frame completely
                const imgRatio = userImage.width / userImage.height;
                const boxRatio = imgBox.w / imgBox.h;
                let renderW, renderH, cx, cy;

                if (imgRatio > boxRatio) {
                    renderH = imgBox.h;
                    renderW = imgBox.h * imgRatio;
                    cx = imgBox.x + (imgBox.w - renderW) / 2;
                    cy = imgBox.y;
                } else {
                    renderW = imgBox.w;
                    renderH = imgBox.w / imgRatio;
                    cx = imgBox.x;
                    cy = imgBox.y + (imgBox.h - renderH) / 2;
                }

                ctx.save();
                ctx.beginPath();
                ctx.roundRect(imgBox.x, imgBox.y, imgBox.w, imgBox.h, 12);
                ctx.clip();
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.drawImage(userImage, cx, cy, renderW, renderH);
                ctx.restore();
            }

            // GLASSMORPHIC NAME TAG
            const name = (document.getElementById('inputName').value || 'MEMBER').toUpperCase();

            ctx.save();
            // Semi-transparent Amber background
            ctx.fillStyle = 'rgba(245, 158, 11, 0.9)';
            ctx.shadowColor = 'rgba(0,0,0,0.15)';
            ctx.shadowBlur = 30;
            ctx.fillRect(imgBox.x - 20, imgBox.y + imgBox.h - 110, imgBox.w + 40, 120);
            ctx.restore();

            ctx.fillStyle = '#000000';
            ctx.textAlign = 'center';
            ctx.font = '900 40px Inter';
            const nameWidth = ctx.measureText(name).width;
            if (nameWidth > imgBox.w + 10) ctx.font = '900 28px Inter';
            ctx.fillText(name, imgBox.x + imgBox.w/2, imgBox.y + imgBox.h - 35);

            // Message Column
            ctx.textAlign = 'left';
            let currentY = 410;

            ctx.fillStyle = AMBER;
            ctx.font = '900 11px Inter';
            ctx.letterSpacing = "1.5px";
            ctx.fillText('MISSION MESSAGE', margin, currentY);
            ctx.letterSpacing = "0px";

            ctx.fillStyle = '#475569';
            ctx.font = '400 22px Inter';
            currentY = wrapText(document.getElementById('inputWishes').value, margin, currentY + 45, leftColWidth, 34);

            currentY += 85;
            ctx.fillStyle = AMBER;
            ctx.font = '900 11px Inter';
            ctx.letterSpacing = "1.5px";
            ctx.fillText('SACRED TEXT', margin, currentY);
            ctx.letterSpacing = "0px";

            ctx.fillStyle = SLATE;
            ctx.font = 'italic 700 32px "Playfair Display"';
            const verseText = `"${document.getElementById('inputVerse').value}"`;
            currentY = wrapText(verseText, margin, currentY + 50, leftColWidth, 42);

            ctx.fillStyle = AMBER;
            ctx.font = '900 18px Inter';
            ctx.fillText(`— ${document.getElementById('inputRef').value.toUpperCase()}`, margin, currentY + 55);

            // Footer
            ctx.fillStyle = '#cbd5e1';
            ctx.font = '800 11px Inter';
            ctx.textAlign = 'left';
            ctx.fillText('© WHILE PILGRIMS HERE WE JOURNEY ON', margin, H - 80);
            ctx.textAlign = 'right';
            ctx.fillText('PRODUCED FOR PILGRIMS FAMILY', W - 80, H - 80);
        }

        function wrapText(text, x, y, maxWidth, lineHeight) {
            const words = text.split(' ');
            let line = '';
            let lastY = y;
            for (let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' ';
                let metrics = ctx.measureText(testLine);
                if (metrics.width > maxWidth && n > 0) {
                    ctx.fillText(line.trim(), x, lastY);
                    line = words[n] + ' ';
                    lastY += lineHeight;
                } else {
                    line = testLine;
                }
            }
            ctx.fillText(line.trim(), x, lastY);
            return lastY;
        }

        function downloadPoster() {
            const name = document.getElementById('inputName').value.trim() || 'Pilgrim';
            const link = document.createElement('a');
            link.download = `PF_Bday_2026_${name.replace(/\s+/g, '_')}.png`;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        }

        ['inputName', 'inputVerse', 'inputRef', 'inputWishes'].forEach(id => {
            document.getElementById(id).addEventListener('input', draw);
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        userImage = img;
                        draw();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        document.fonts.ready.then(draw);
    </script>
</body>
</html>
