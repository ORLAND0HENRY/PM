<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orlantech | Professional 3D Rig</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background-color: #f8fafc; overflow: hidden; font-family: 'Inter', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; cursor: crosshair; }
        .ui-overlay { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; padding: 60px; z-index: 10; }
        .accent-line { width: 40px; height: 4px; background: #f59e0b; margin-bottom: 1rem; }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <div class="accent-line"></div>
        <h1 class="text-6xl font-black text-slate-900 tracking-tighter uppercase italic leading-none">
            Orlan<span class="text-amber-500">tech.</span>
        </h1>
        <p class="text-slate-400 font-mono text-xs mt-4 tracking-[0.3em]">
            >> MESH_CORE: CONNECTED <br>
            >> RIG_TYPE: INTERACTIVE_3D
        </p>
        
        <div class="mt-20 pointer-events-auto">
            <button class="group relative px-8 py-3 font-bold text-slate-900 transition-all duration-300">
                <span class="absolute inset-0 border-2 border-slate-900 transition-all group-hover:m-1"></span>
                <span class="relative">EXPLORE PROJECTS</span>
            </button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, model;
        let mouseX = 0, mouseY = 0;

        function init() {
            scene = new THREE.Scene();
            
            // Camera setup - pulled back slightly for better framing
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0.8, 6);

            // Studio Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            // Amber Key Light - highlights the character with your signature color
            const spotlight = new THREE.DirectionalLight(0xf59e0b, 1.8); 
            spotlight.position.set(5, 5, 5);
            scene.add(spotlight);

            // Subtle Rim Light for that "Pro" look
            const rimLight = new THREE.PointLight(0xffffff, 0.5);
            rimLight.position.set(-5, 2, -5);
            scene.add(rimLight);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            // Better color rendering
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const loader = new THREE.GLTFLoader();
            loader.load('https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb', (gltf) => {
                model = gltf.scene;
                model.scale.set(0.6, 0.6, 0.6);
                model.position.y = -1.5;
                // Center the character horizontally
                model.position.x = 0.5; 
                scene.add(model);
            });

            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('resize', onResize);
            animate();
        }

        function onMouseMove(e) {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        }

        function animate() {
            requestAnimationFrame(animate);

            if (model) {
                // Smooth rotation of the whole rig
                // Horizontal tracking (Y-axis)
                model.rotation.y = THREE.MathUtils.lerp(model.rotation.y, mouseX * 0.45, 0.08);
                // Vertical tracking (X-axis)
                model.rotation.x = THREE.MathUtils.lerp(model.rotation.x, -mouseY * 0.15, 0.08);
            }

            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
