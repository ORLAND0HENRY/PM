<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orlantech | Interactive Rig</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background-color: #0f172a; overflow: hidden; font-family: 'Inter', sans-serif; }
        #canvas-container { position: fixed; inset: 0; z-index: 1; touch-action: none; }
        .ui-overlay { position: relative; z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }
        /* Custom scrollbar for future sections */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #f59e0b; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100">

    <div id="canvas-container"></div>

    <main class="ui-overlay min-h-screen flex flex-col justify-between p-8 md:p-16">
        <header>
            <div class="w-12 h-1 bg-amber-500 mb-6"></div>
            <h1 class="text-5xl md:text-7xl font-black tracking-tighter uppercase italic">
                Orlan<span class="text-amber-500">tech.</span>
            </h1>
            <p class="text-slate-500 font-mono text-[10px] mt-4 tracking-[0.4em] uppercase">
                System Status: Operational // Terminal 01
            </p>
        </header>

        <footer class="flex flex-col md:flex-row md:items-end justify-between gap-8">
            <div class="interactive">
                <button class="group relative px-10 py-4 font-bold text-white transition-all">
                    <span class="absolute inset-0 border border-slate-700 group-hover:border-amber-500 transition-colors"></span>
                    <span class="absolute inset-0 translate-x-1 translate-y-1 bg-amber-500/10 group-hover:translate-x-0 group-hover:translate-y-0 transition-transform"></span>
                    <span class="relative">EXPLORE PROJECTS</span>
                </button>
            </div>

            <div class="text-right font-mono text-[10px] text-slate-500 space-y-1">
                <p>LATENCY: 14MS</p>
                <p>CORE: DJANGO_SDA_V3</p>
                <p>© 2026 ORLANTECH INNOVATIONS</p>
            </div>
        </footer>
    </main>

    <script>
        /** * @module OrlantechRig
         * Professional 3D environment setup
         */

        let scene, camera, renderer, model, clock;
        const container = document.getElementById('canvas-container');

        const state = {
            mouseX: 0,
            mouseY: 0,
            targetX: 0,
            targetY: 0
        };

        function init() {
            scene = new THREE.Scene();
            clock = new THREE.Clock();

            // Camera Setup
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1, 5);

            // Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Performance cap
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            container.appendChild(renderer.domElement);

            // Lighting Rig
            const ambient = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambient);

            const amberLight = new THREE.SpotLight(0xf59e0b, 2);
            amberLight.position.set(5, 5, 5);
            amberLight.castShadow = true;
            scene.add(amberLight);

            // Environment: Grid Floor for "Tech" feel
            const grid = new THREE.GridHelper(20, 40, 0xf59e0b, 0x1e293b);
            grid.position.y = -1.5;
            grid.material.opacity = 0.2;
            grid.material.transparent = true;
            scene.add(grid);

            // Load Asset
            const loader = new THREE.GLTFLoader();
            loader.load(
                'https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb',
                (gltf) => {
                    model = gltf.scene;
                    model.scale.set(0.65, 0.65, 0.65);
                    model.position.y = -1.5;
                    scene.add(model);
                },
                undefined,
                (error) => console.error('Error loading 3D asset:', error)
            );

            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('resize', onResize);
            animate();
        }

        function onMouseMove(e) {
            state.targetX = (e.clientX / window.innerWidth) * 2 - 1;
            state.targetY = (e.clientY / window.innerHeight) * 2 - 1;
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Smooth Interpolation (Lerp) for movement
            state.mouseX += (state.targetX - state.mouseX) * 0.05;
            state.mouseY += (state.targetY - state.mouseY) * 0.05;

            if (model) {
                model.rotation.y = state.mouseX * 0.5;
                model.rotation.x = state.mouseY * 0.1;
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
