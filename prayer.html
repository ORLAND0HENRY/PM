<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kangemi Ambassadors Schedule Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .brand-amber { color: #f59e0b; }
        .bg-brand-amber { background-color: #f59e0b; }

        /* A4/A5 Aspect Ratio Container for Capture */
        #poster-container {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1.414;
            margin: 0 auto;
            background: white;
            position: relative;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        .capture-mode {
            border-radius: 0 !important;
            box-shadow: none !important;
            width: 400px !important;
        }

        /* Mobile specific adjustments to ensure the A4 preview fits the screen */
        @media (max-width: 440px) {
            #poster-container {
                max-width: 95vw;
            }
        }

        @media print {
            .no-print { display: none; }
        }
    </style>
</head>
<body class="min-h-screen pb-10">

    <!-- Header -->
    <header class="bg-white border-b no-print sticky top-0 z-20">
        <div class="max-w-xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-sm font-black text-gray-800 tracking-tighter">
                <span class="brand-amber uppercase">Kangemi</span> Ambassadors
            </h1>
            <div class="flex gap-3">
                <button onclick="toggleSection('members')" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest hover:text-amber-500 transition-colors">Directory</button>
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto px-4 mt-6 space-y-6">

        <!-- Members Panel -->
        <section id="members-section" class="hidden bg-white p-4 rounded-2xl shadow-sm border border-gray-100 no-print">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-xs font-black uppercase text-gray-400 tracking-widest">Member Directory</h2>
                <button onclick="toggleSection('members')" class="text-xs text-gray-300">✕</button>
            </div>
            <div id="member-list" class="flex flex-wrap gap-1.5 mb-4 max-h-32 overflow-y-auto p-1"></div>
            <div class="flex gap-2">
                <input id="new-name" type="text" placeholder="Name" class="flex-1 text-xs border border-gray-100 bg-gray-50 p-2.5 rounded-xl outline-none focus:ring-1 focus:ring-amber-500">
                <select id="new-gender" class="text-xs border border-gray-100 bg-gray-50 p-2.5 rounded-xl">
                    <option value="Male">M</option>
                    <option value="Female">F</option>
                </select>
                <button onclick="addMember()" class="bg-gray-800 text-white px-5 rounded-xl text-xs font-bold">Add</button>
            </div>
        </section>

        <!-- Generate Trigger - Compacted -->
        <div class="no-print text-center">
            <button onclick="generateSchedule()" class="inline-flex items-center gap-2 bg-brand-amber text-white font-bold py-3 px-8 rounded-full shadow-lg shadow-amber-200 hover:bg-amber-600 transition-all text-xs uppercase tracking-widest">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                Generate Next Week
            </button>
        </div>

        <!-- The Poster (The "Canvas") -->
        <div id="poster-container" class="flex flex-col">
            <div class="h-2 bg-brand-amber w-full"></div>

            <div class="flex-1 flex flex-col p-6 sm:p-8">
                <!-- Header Info -->
                <div class="text-center mb-6">
                    <div class="inline-block px-3 py-1 rounded bg-amber-50 text-amber-600 text-[9px] font-bold uppercase tracking-[0.2em] mb-3">Spiritual Year 2026</div>
                    <h2 class="text-2xl font-black text-gray-900 leading-none uppercase tracking-tighter sm:text-3xl">Prayer Lead<br>Schedule</h2>
                    <div class="w-10 h-1 bg-amber-100 mx-auto mt-4 rounded-full"></div>
                </div>

                <!-- Schedule Table -->
                <div class="flex-1">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-[8px] font-black text-gray-300 uppercase tracking-[0.15em] border-b border-gray-50">
                                <th class="py-3 px-2">Day</th>
                                <th class="py-3 px-1 text-center">Morning (5AM)</th>
                                <th class="py-3 px-1 text-center">Evening (8PM)</th>
                            </tr>
                        </thead>
                        <tbody id="schedule-body">
                            <!-- Rows -->
                        </tbody>
                    </table>
                </div>

                <!-- Footer -->
                <div class="pt-6 text-center">
                    <p class="text-[10px] text-gray-400 font-medium italic px-4 leading-relaxed">
                        "Prayer does not bring God down to us, but brings us up to Him"
                    </p>
                    <div class="mt-4 flex justify-center items-center gap-1.5">
                        <div class="h-[1px] w-4 bg-amber-100"></div>
                        <div class="w-1.5 h-1.5 rounded-full bg-amber-500"></div>
                        <div class="h-[1px] w-4 bg-amber-100"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Export Actions - More compact -->
        <div id="export-controls" class="hidden no-print">
            <div class="grid grid-cols-2 gap-3">
                <button onclick="downloadPoster()" class="bg-gray-900 text-white font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 text-xs shadow-lg">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Save Poster
                </button>
                <button onclick="exportToWhatsApp()" class="bg-white border border-gray-200 text-gray-600 font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 text-xs shadow-sm">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766 0-3.187-2.59-5.771-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.312.045-.713.074-1.136-.07-.27-.092-.589-.204-.982-.372-1.666-.714-2.731-2.42-2.814-2.53-.083-.11-.678-.902-.678-1.72 0-.819.426-1.221.578-1.388.152-.167.33-.21.44-.21.11 0 .22.002.315.006.101.005.234-.038.366.28.132.318.454 1.104.494 1.187.04.083.067.18.012.29-.055.11-.083.18-.166.276-.083.095-.174.211-.25.283-.083.075-.17.157-.073.324.097.167.432.713.927 1.154.637.568 1.173.744 1.34.827.167.083.265.069.363-.042.098-.111.417-.484.528-.65.111-.166.222-.138.374-.083.152.055.965.456 1.132.539.166.084.277.125.319.194.041.07.041.404-.103.809z"/></svg>
                    Copy Text
                </button>
            </div>
        </div>

    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900/95 text-white px-6 py-3 rounded-2xl text-[10px] font-bold opacity-0 transition-opacity z-50 pointer-events-none tracking-widest uppercase"></div>

    <script>
        let members = [
            { name: "Orlando", gender: "Male", count: 0 },
            { name: "Ruth Nyaboke ", gender: "Female", count: 0 },
            { name: "Methuselah", gender: "Male", count: 0 },
            { name: "Teddy", gender: "Male", count: 0 },
            { name: "Diana", gender: "Female", count: 0 },
            { name: "Askah", gender: "Female", count: 0 },
            { name: "Annita ", gender: "Female", count: 0 },
            { name: "June", gender: "Female", count: 0 },
            { name: "Tina", gender: "Female", count: 0 },
            { name: "Juma", gender: "Male", count: 0 },
            { name: "Mercy John", gender: "Female", count: 0 },
            { name: "Lamech", gender: "Male", count: 0 },
            { name: "Davy", gender: "Male", count: 0 },
            { name: "Brayo", gender: "Male", count: 0 },
            { name: "Brenda", gender: "Female", count: 0 },
            { name: "Britt", gender: "Female", count: 0 },
            { name: "Esther", gender: "Female", count: 0 },
            { name: "Géraldine", gender: "Female", count: 0 },
            { name: "Hellen", gender: "Female", count: 0 },
            { name: "Hope", gender: "Female", count: 0 },
            { name: "Jane", gender: "Female", count: 0 },
            { name: "Kipngetich", gender: "Male", count: 0 },
            { name: "Elsie ", gender: "Female", count: 0 },
            { name: "Leah", gender: "Female", count: 0 },
            { name: "Manu", gender: "Male", count: 0 },
            { name: "Masinga", gender: "Female", count: 0 },
            { name: "Koros", gender: "Male", count: 0 },
            { name: "Millie", gender: "Female", count: 0 },
            { name: "mkwambox", gender: "Female", count: 0 },
            { name: "Nicole", gender: "Female", count: 0 },
            { name: "Obadiah", gender: "Male", count: 0 },
            { name: "Onesmas", gender: "Male", count: 0 },
            { name: "Purity", gender: "Female", count: 0 },
            { name: "Quinvada", gender: "Female", count: 0 },
            { name: "Rael", gender: "Female", count: 0 },
            { name: "Ruth Tende", gender: "Female", count: 0 },
            { name: "V£ra", gender: "Female", count: 0 },
            { name: "Valentine", gender: "Female", count: 0 },
            { name: "Caleb Oseko", gender: "Male", count: 0 },
            { name: "Centrine", gender: "Female", count: 0 }
        ];

        let currentSchedule = [];
        const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];

        function toggleSection(id) {
            document.getElementById(id + '-section').classList.toggle('hidden');
        }

        function renderMemberList() {
            const list = document.getElementById('member-list');
            list.innerHTML = members.map((m, i) => `
                <div class="flex items-center gap-1.5 bg-gray-50 border border-gray-100 px-2 py-1.5 rounded-lg text-[9px] font-bold">
                    <span class="${m.gender === 'Male' ? 'text-blue-400' : 'text-pink-400'}">●</span> ${m.name}
                    <button onclick="removeMember(${i})" class="text-gray-300 ml-1 hover:text-red-400 transition-colors">✕</button>
                </div>
            `).join('');
        }

        function addMember() {
            const nameEl = document.getElementById('new-name');
            const name = nameEl.value.trim();
            const gender = document.getElementById('new-gender').value;
            if(!name) return;
            members.push({ name, gender, count: 0 });
            nameEl.value = '';
            renderMemberList();
        }

        function removeMember(index) {
            members.splice(index, 1);
            renderMemberList();
        }

        function generateSchedule() {
            currentSchedule = [];
            days.forEach((day, i) => {
                let morning, evening;
                if (i % 2 === 0) {
                    morning = getNextMember('Male');
                    evening = getNextMember('Female');
                } else {
                    morning = getNextMember('Female');
                    evening = getNextMember('Male');
                }
                currentSchedule.push({ day, morning, evening });
            });
            renderSchedule(false);
            document.getElementById('export-controls').classList.remove('hidden');
            showToast("New Schedule Ready!");
        }

        function getNextMember(gender) {
            const pool = members.filter(m => m.gender === gender).sort((a,b) => a.count - b.count);
            if (pool.length === 0) return "---";
            const topPool = pool.filter(p => p.count === pool[0].count);
            const picked = topPool[Math.floor(Math.random() * topPool.length)];
            picked.count++;
            return picked.name;
        }

        // Manual update function for editing
        function updateManual(index, shift, value) {
            currentSchedule[index][shift] = value;
        }

        function renderSchedule(isForCapture = false) {
            const tbody = document.getElementById('schedule-body');
            tbody.innerHTML = currentSchedule.map((row, i) => {
                if (isForCapture) {
                    return `
                        <tr class="border-b border-gray-50">
                            <td class="py-4 px-2 font-bold text-gray-800 text-xs">${row.day}</td>
                            <td class="py-4 px-1 text-center text-gray-500 font-semibold text-[10px]">${row.morning}</td>
                            <td class="py-4 px-1 text-center text-gray-500 font-semibold text-[10px]">${row.evening}</td>
                        </tr>
                    `;
                } else {
                    return `
                        <tr class="border-b border-gray-50 hover:bg-amber-50/50 transition-colors">
                            <td class="py-3 px-2 font-bold text-gray-800 text-[11px]">${row.day}</td>
                            <td class="py-3 px-1 text-center">
                                <input type="text" value="${row.morning}"
                                    oninput="updateManual(${i}, 'morning', this.value)"
                                    class="w-full bg-transparent text-center text-[10px] font-semibold text-amber-600 focus:bg-white outline-none rounded p-1">
                            </td>
                            <td class="py-3 px-1 text-center">
                                <input type="text" value="${row.evening}"
                                    oninput="updateManual(${i}, 'evening', this.value)"
                                    class="w-full bg-transparent text-center text-[10px] font-semibold text-amber-600 focus:bg-white outline-none rounded p-1">
                            </td>
                        </tr>
                    `;
                }
            }).join('');
        }

        async function downloadPoster() {
            const container = document.getElementById('poster-container');

            showToast("Capturing...");

            // 1. Switch to static view for clean capture
            renderSchedule(true);
            container.classList.add('capture-mode');

            try {
                // Small delay to ensure rendering completes
                await new Promise(r => setTimeout(r, 100));

                const canvas = await html2canvas(container, {
                    scale: 3,
                    useCORS: true,
                    backgroundColor: "#ffffff",
                    width: 400,
                    height: 566
                });

                const link = document.createElement('a');
                link.download = `Ambassadors_Prayer_Schedule.png`;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
                showToast("Saved to Gallery!");
            } catch (e) {
                showToast("Capture failed.");
            } finally {
                // 2. Restore interactive view
                container.classList.remove('capture-mode');
                renderSchedule(false);
            }
        }

        function exportToWhatsApp() {
            let text = `*KANGEMI AMBASSADORS PRAYER SCHEDULE*\n_Spiritual Year 2026_\n\n`;
            currentSchedule.forEach(r => {
                text += `*${r.day}*\n🌅 05:00 AM: ${r.morning}\n🌃 08:00 PM: ${r.evening}\n\n`;
            });
            text += `_"Prayer does not bring God down to us, but brings us up to Him"_`;

            navigator.clipboard.writeText(text).then(() => {
                showToast("Text Copied!");
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('opacity-100');
            setTimeout(() => toast.classList.remove('opacity-100'), 2500);
        }

        renderMemberList();
    </script>
</body>
</html>
