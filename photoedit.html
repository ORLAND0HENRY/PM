<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORLANTECH // PORTRAIT EDITOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .duotone-container { position: relative; width: 100%; height: 100%; }
        .base-image { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            filter: grayscale(1) contrast(120%) brightness(100%);
        }
        .multiply-layer { 
            position: absolute; 
            inset: 0; 
            background-color: #f59e0b; 
            mix-blend-mode: multiply; 
            opacity: 0.8; 
        }
        .screen-layer { 
            position: absolute; 
            inset: 0; 
            background-color: #d97706; 
            mix-blend-mode: screen; 
            opacity: 0.2; 
        }
    </style>
</head>
<body class="bg-neutral-950 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md bg-neutral-900 rounded-[2.5rem] p-8 shadow-2xl border border-white/5">
        <header class="mb-8 text-center">
            <h1 class="text-2xl font-black text-amber-500 uppercase tracking-tighter">Portrait Editor</h1>
            <p class="text-neutral-500 text-[10px] font-bold uppercase tracking-[0.2em]">Orlantech Innovations Tooling</p>
        </header>

        <!-- Preview Area -->
        <div id="dropZone" class="relative aspect-square w-full rounded-3xl bg-black overflow-hidden border-2 border-dashed border-neutral-800 flex items-center justify-center mb-8 transition-all">
            <div id="placeholder" class="flex flex-col items-center text-neutral-600">
                <i data-lucide="camera" class="w-12 h-12 mb-2 stroke-1"></i>
                <span class="text-xs font-bold uppercase tracking-widest">Select Portrait</span>
            </div>
            <div id="previewWrapper" class="hidden w-full h-full relative">
                <img id="mainImage" class="base-image" src="" alt="">
                <div class="multiply-layer"></div>
                <div class="screen-layer"></div>
            </div>
        </div>

        <input type="file" id="fileInput" class="hidden" accept="image/*">

        <!-- Controls -->
        <div id="controls" class="hidden space-y-6">
            <div class="space-y-3">
                <div class="flex justify-between text-[10px] font-black uppercase tracking-widest text-neutral-500">
                    <span>Contrast Strength</span>
                    <span id="contrastVal" class="text-amber-500">120%</span>
                </div>
                <input type="range" id="contrastRange" min="50" max="200" value="120" 
                    class="w-full h-1.5 bg-neutral-800 rounded-lg appearance-none cursor-pointer accent-amber-500">
            </div>

            <div class="flex gap-3 pt-2">
                <button onclick="resetEditor()" class="flex-1 bg-neutral-800 hover:bg-neutral-700 py-4 rounded-2xl flex items-center justify-center gap-2 transition-all text-xs font-bold uppercase tracking-widest">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> Reset
                </button>
                <button onclick="alert('Screenshot the preview area to save your high-res edit!')" class="flex-[2] bg-amber-500 hover:bg-amber-600 text-black py-4 rounded-2xl flex items-center justify-center gap-2 transition-all text-xs font-black uppercase tracking-widest shadow-lg shadow-amber-500/20">
                    <i data-lucide="check-circle" class="w-4 h-4"></i> Apply Filter
                </button>
            </div>
        </div>

        <button id="uploadBtn" onclick="document.getElementById('fileInput').click()" class="w-full py-5 bg-neutral-800 hover:bg-neutral-700 rounded-2xl flex items-center justify-center gap-3 transition-all text-sm font-bold uppercase tracking-widest border border-white/5">
            <i data-lucide="upload" class="w-5 h-5"></i> Choose Image
        </button>
    </div>

    <div class="mt-8 flex items-center gap-3 text-neutral-700">
        <div class="w-8 h-[1px] bg-neutral-800"></div>
        <span class="text-[10px] font-black uppercase tracking-[0.4em]">Pilgrim Family 2026</span>
        <div class="w-8 h-[1px] bg-neutral-800"></div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        const fileInput = document.getElementById('fileInput');
        const mainImage = document.getElementById('mainImage');
        const previewWrapper = document.getElementById('previewWrapper');
        const placeholder = document.getElementById('placeholder');
        const controls = document.getElementById('controls');
        const uploadBtn = document.getElementById('uploadBtn');
        const contrastRange = document.getElementById('contrastRange');
        const contrastVal = document.getElementById('contrastVal');
        const dropZone = document.getElementById('dropZone');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    mainImage.src = event.target.result;
                    previewWrapper.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    controls.classList.remove('hidden');
                    uploadBtn.classList.add('hidden');
                    dropZone.classList.remove('border-dashed');
                    dropZone.classList.add('border-solid', 'border-white/10');
                };
                reader.readAsDataURL(file);
            }
        });

        contrastRange.addEventListener('input', function(e) {
            const val = e.target.value;
            contrastVal.innerText = val + '%';
            mainImage.style.filter = `grayscale(1) contrast(${val}%) brightness(100%)`;
        });

        function resetEditor() {
            fileInput.value = '';
            mainImage.src = '';
            previewWrapper.classList.add('hidden');
            placeholder.classList.remove('hidden');
            controls.classList.add('hidden');
            uploadBtn.classList.remove('hidden');
            dropZone.classList.add('border-dashed');
            dropZone.classList.remove('border-solid', 'border-white/10');
        }
    </script>
</body>
</html>
